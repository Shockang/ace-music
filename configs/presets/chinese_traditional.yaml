    omega_scale: 7.0
    infer_step: 50
    genres: ["chinese_traditional", "ambient"]
    mood: ["calm"]

  - id: folk_dance
    name: Chinese Folk Dance
    description: Upbeat Chinese folk music for dance and celebration
    prompt: "chinese traditional, folk, dance, upbeat, suona, percussion, festive"
