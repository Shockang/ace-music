    name: Gu Feng Guzheng
    description: Traditional Chinese style with guzheng and bamboo flute
    prompt: "chinese traditional, guzheng, bamboo flute, pentatonic, gufeng"
    guidance_scale: 13.0
    omega_scale: 9.0
    infer_step: 60
    genres: ["chinese_traditional"]
    mood: ["calm", "dreamy"]

  - id: gufeng_epic
    name: Gu Feng Epic
    description: Epic Chinese style with orchestral and traditional instruments
    prompt: "chinese traditional, erhu, pipa, orchestral, epic, pentatonic"
    guidance_scale: 16.0
    omega_scale: 10.0
    infer_step: 60
    genres: ["chinese_traditional"]
    mood: ["energetic", "dark"]

  - id: chinese_ambient
    name: Chinese Ambient
    description: Meditative ambient with Chinese instruments
