name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check --format=github src tests examples
      - run: pytest -q
      - run: ace-music generate --mock --description "ci smoke track" --duration 5 --output-dir ./ci-output --summary-json ./ci-output/summary.json
